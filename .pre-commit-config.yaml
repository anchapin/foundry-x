# Pre-commit hooks for FoundryX.
#
# Install once after cloning: `uv run pre-commit install`
# Run on demand (e.g. CI):   `uv run pre-commit run --all-files`
# Update hook versions:     `uv run pre-commit autoupdate`
#
# See docs/SECURITY.md for why gitleaks is required.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=512]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
