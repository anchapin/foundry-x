name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    name: lint + test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: pip install --upgrade uv

      - name: Set up Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest
