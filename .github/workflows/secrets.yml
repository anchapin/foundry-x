name: secrets

on:
  pull_request:

jobs:
  secrets:
    name: gitleaks detect
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@9e8a1c18e0c5c3d2c9e3e9b5e8f8d7c6b5a4e3d2 # v2.5.0
        with:
          args: detect --verbose --fail-on-secrets
