name: rocm

on:
  pull_request:
    paths:
      - "infra/llama-cpp/**"
      - ".github/workflows/rocm.yml"
  push:
    branches: [develop]

jobs:
  rocm-check:
    name: ROCm pre-flight check (issue #637)
    runs-on: self-hosted-rocm
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: ROCm pre-flight check
        run: infra/llama-cpp/rocm_setup.sh --check-rocm
