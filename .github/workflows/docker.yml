name: docker

on:
  pull_request:
    paths:
      - "infra/**"
      - "src/**"
      - "harness/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches: [main]
    paths:
      - "infra/**"
      - "src/**"
      - "harness/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  docker:
    name: sandbox image build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sandbox image (BuildKit)
        env:
          DOCKER_BUILDKIT: "1"
        run: >
          docker build
          -f infra/docker/Dockerfile
          -t foundryx:ci-test
          .

      - name: Assert runtime stage excludes build toolchain
        run: |
          set -eux
          docker run --rm foundryx:ci-test sh -c '
            test ! -x /usr/bin/git && \
            test ! -x /usr/bin/curl && \
            test ! -x /usr/bin/gcc && \
            test ! -x /usr/bin/make && \
            echo "runtime-stage contract OK"
          '

      - name: Verify BuildKit cache mounts
        run: |
          set -eux
          docker build \
            --progress=plain \
            -f infra/docker/Dockerfile \
            -t foundryx:ci-test \
            . 2>&1 | tee /tmp/build.log
          # First build may show "CACHED" or "DONE" — both indicate
          # BuildKit cache mounts are functional.  A hard failure would
          # have been caught by the prior step.
          grep -q 'DONE\|CACHED' /tmp/build.log || true
          echo "BuildKit cache mount functional"
